# L2 #29 Dependabot baseline for PlayCua.
# Requested cadence:
# - cargo: weekly Monday
# - npm: weekly Tuesday
# - go-modules: weekly Wednesday (Dependabot ecosystem key: gomod)
# - github-actions: weekly Thursday
# - dockerfile: weekly Friday (Dependabot ecosystem key: docker)

version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "kooshapari"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
    reviewers:
      - "kooshapari"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    reviewers:
      - "kooshapari"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
    reviewers:
      - "kooshapari"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    reviewers:
      - "kooshapari"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"

