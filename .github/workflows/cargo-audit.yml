name: Cargo Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3"
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master') }}

jobs:
  cargo-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust
        # NOTE: dtolnay/rust-action repo was archived/removed and currently
        # returns 404 from GitHub. Migrated to dtolnay/rust-toolchain (the
        # current maintained action) pinned to its `master` branch SHA, which
        # is the implementation that backs the `@stable` moving ref.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable

      - name: Run cargo-audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
