name: Secret Scan
description: >
  Run gitleaks and TruffleHog secret scanners on every push, pull request,
  and weekly schedule. Fails the build when verified secrets are committed.
  Configuration: .gitleaks.toml + .trufflehog.yml at the repository root.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly on Monday at 04:17 UTC (offset from other scheduled jobs).
    - cron: '17 4 * * 1'
  workflow_dispatch: {}

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2 # SHA-pin pending (L2 #31)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@ac0805e53b065e7188181fc80dce1800dfa51ab9 # main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified --fail
