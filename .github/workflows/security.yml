name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  

jobs:
  # Secret Scanning
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets scan (trufflehog)
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
  # SAST Scanning
  sast:
    name: SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Clippy Security Lints
        run: cargo clippy -- -D warnings -W clippy::panic -W clippy::unwrap_used

      - name: Run Cargo Audit
        uses: actions-rust-lang/audit@v1
        with:
          file: Cargo.lock

      

  # Dependency Vulnerability Scanning
  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Cargo Audit
        run: |
          cargo install cargo-audit
          cargo audit

      

  # Container Scanning (if Dockerfile exists)
  container:
    name: Container Scan
    runs-on: ubuntu-latest
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ github.event.repository.name }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: '${{ github.event.repository.name }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
