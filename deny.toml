# cargo-deny configuration
[graph]
all-features = false

[advisories]
ignore = [
    "RUSTSEC-2024-0384",  # instant (transitive only; pending upstream fix)
]

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC", "Zlib"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
